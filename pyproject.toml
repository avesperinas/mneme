[tool.uv.workspace]
members = ["backend", "ingestion"]

[dependency-groups]
dev = [
    "ruff>=0.5.0",
    "black>=24.4.0",
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]

[tool.black]
target-version = ["py312"]
line-length = 88

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
